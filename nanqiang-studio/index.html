<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;

        body {

            padding-top: 100px;

        }
        .price {

        }
    </style>
</head>
<body>

    <p>欢迎下单！</p >

    <!-- 你截图里的网课代看商品，直接写进去 -->
    <div class="product">
        <h3>网课代看</h3>
        <div class="price">¥ 3.00 ~ 5.00</div>
    </div>
    
    <div class="product">

</div>
